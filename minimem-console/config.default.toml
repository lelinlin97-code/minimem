# ─────────────────────────────────────
# MiniMem Console — 默认配置
# ─────────────────────────────────────

[server]
host = "127.0.0.1"
port = 3080

[minimem]
# MiniMem 引擎地址（可通过环境变量 MINIMEM_BASE_URL 覆盖）
base_url = "http://127.0.0.1:6677"
# MiniMem 数据目录（读取 Dream 报告等，只读）
data_dir = "~/.minimem"
# JWT 认证 Token（可通过环境变量 MINIMEM_API_TOKEN 覆盖）
api_token_env = "MINIMEM_API_TOKEN"

[llm]
# Console Pipeline 用的 LLM 配置
provider = "openai-compatible"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "MINIMEM_LLM_API_KEY"
model = "qwen-plus"
temperature = 0.7
max_tokens = 4096

[storage]
# Console 自身数据目录
data_dir = "~/.minimem-console"
# SQLite 数据库文件名
db_name = "console.db"

[pipeline]
# Pipeline 输出报告的默认目录
output_dir = "~/.minimem-console/reports"

[smtp]
# 邮件发送配置（output-email 节点需要）
# 启用后 output-email 节点可以真正发送邮件
enabled = false
host = ""
port = 465
secure = true
# 认证信息（推荐通过环境变量 SMTP_USER / SMTP_PASS 配置）
user_env = "SMTP_USER"
pass_env = "SMTP_PASS"
# 发件人地址和名称
from_address = ""
from_name = "MiniMem Console"
