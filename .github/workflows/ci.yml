name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install minimem deps
        run: cd minimem && pnpm install --frozen-lockfile

      - name: Type check
        run: cd minimem && pnpm typecheck

      - name: Test (requires API key)
        if: env.MINIMEM_LLM_API_KEY != ''
        run: cd minimem && pnpm test
        env:
          MINIMEM_LLM_API_KEY: ${{ secrets.MINIMEM_LLM_API_KEY }}

  console-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: cd minimem-console && pnpm install --frozen-lockfile

      - name: Build
        run: cd minimem-console && pnpm build || echo "⚠️ Build has warnings"
