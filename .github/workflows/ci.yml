name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: minimem/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: minimem

      - name: Type check
        run: pnpm typecheck
        working-directory: minimem

      - name: Lint
        run: pnpm lint
        working-directory: minimem

      - name: Test
        run: pnpm test
        working-directory: minimem
        env:
          MINIMEM_LLM_API_KEY: ${{ secrets.MINIMEM_LLM_API_KEY }}

  console-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: minimem-console/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: minimem-console

      - name: Build
        run: pnpm build
        working-directory: minimem-console
